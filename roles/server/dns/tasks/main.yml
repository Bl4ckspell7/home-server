- name: Stop and disable systemd-resolved
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: stopped
    enabled: false
    masked: true

- name: Remove resolv.conf symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: Write static /etc/resolv.conf pointing at pi-hole on loopback
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      # Managed by Ansible — pi-hole on 127.0.0.54 forwards to dnscrypt-proxy
      nameserver 127.0.0.54
      options edns0 trust-ad
    owner: root
    group: root
    mode: "0644"

- name: Deploy dnscrypt-proxy config
  ansible.builtin.copy:
    src: dnscrypt-proxy.toml
    dest: /etc/dnscrypt-proxy/dnscrypt-proxy.toml
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnscrypt-proxy

- name: Ensure dnscrypt-proxy enabled and running
  ansible.builtin.systemd_service:
    name: dnscrypt-proxy
    state: started
    enabled: true
    daemon_reload: true
