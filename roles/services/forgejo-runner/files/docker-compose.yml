# Forgejo Actions runner.
#
# Job isolation: the runner does NOT touch the host Docker socket. A dedicated
# Docker-in-Docker daemon (`dind`) runs the job containers, so a compromised
# workflow only gets root INSIDE the isolated dind container, never on the host.
#
# The runner polls Forgejo at http://forgejo.lan:3000 (direct via svr1-network,
# bypasses caddy/anubis). Nothing connects TO the runner — outbound only.
name: forgejo-runner
services:
  runner:
    image: data.forgejo.org/forgejo/runner:12.13.2@sha256:eb6e7bc21973382d261e6eb883dbd27b8cb56939d33a3bfd79a1352b7f9a33a0
    container_name: forgejo-runner
    user: 904:904
    restart: unless-stopped
    environment:
      DOCKER_HOST: unix:///sock/docker.sock
    command: ["forgejo-runner", "daemon", "--config", "/config.yml"]
    volumes:
      - ./data:/data
      - ./config.yml:/config.yml:ro
      - dind_sock:/sock
    networks:
      forgejo-runner:
      svr1-network:
    dns:
      - 172.21.255.254
    dns_search:
      - "."
    depends_on:
      dind:
        condition: service_healthy

  dind:
    image: docker.io/library/docker:29.6.1-dind@sha256:66d292e5c26bd33a6f6f61cacb880de2186339a524ecba1ce098dbbaceed6515
    container_name: forgejo-runner-dind
    restart: unless-stopped
    # Required to run a nested Docker daemon; blast radius is this container,
    # not the host.
    privileged: true
    # API only as unix socket on the shared volume — no network listener.
    # --group=904 grants the non-root runner socket access (numeric gid, no
    # named group needed inside the image).
    command: ["--host=unix:///sock/docker.sock", "--group=904"]
    volumes:
      - dind_data:/var/lib/docker
      - dind_sock:/sock
    networks:
      forgejo-runner:
      # Job containers NAT out through dind, so dind needs svr1-network +
      # Pi-hole DNS for checkouts from forgejo.lan.
      svr1-network:
    dns:
      - 172.21.255.254
    dns_search:
      - "."
    healthcheck:
      test: ["CMD-SHELL", "DOCKER_HOST=unix:///sock/docker.sock docker info >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  dind_data:
    name: forgejo_runner_dind_data
  dind_sock:
    name: forgejo_runner_dind_sock

networks:
  forgejo-runner:
    external: false
  svr1-network:
    external: true
