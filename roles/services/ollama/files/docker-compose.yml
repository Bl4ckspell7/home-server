name: ollama
services:
  ollama:
    container_name: ollama
    image: ollama/ollama:0.24.0@sha256:a6149234667efc71d37766d61c1a16f24c33e4cd7a0bf4125c44a7e47e2419c4
    restart: unless-stopped
    expose:
      - "11434"
    networks:
      svr1-network:
        ipv4_address: 172.21.255.241
    dns:
      - 172.21.255.254
    dns_search:
      - "."
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama ps || exit 1"]
      interval: 30s

volumes:
  ollama_data:

networks:
  svr1-network:
    external: true
