---
- name: Ensure Homepage directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/stacks/homepage/config
    - /opt/stacks/homepage/icons

- name: Copy Homepage config files
  ansible.builtin.copy:
    src: "config/{{ item }}"
    dest: "/opt/stacks/homepage/config/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - bookmarks.yaml
    - services.yaml
    - settings.yaml
    - widgets.yaml
    - custom.js

- name: Copy Homepage icons
  ansible.builtin.copy:
    src: "icons/"
    dest: "/opt/stacks/homepage/icons/"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Homepage
  ansible.builtin.include_tasks: deploy_stack.yml
  vars:
    service_name: homepage
