---
- name: Ensure Pi-hole dnsmasq.d directory exists
  ansible.builtin.file:
    path: /opt/stacks/pi-hole/dnsmasq.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy custom dnsmasq snippets
  ansible.builtin.copy:
    src: dnsmasq.d/
    dest: /opt/stacks/pi-hole/dnsmasq.d/
    owner: root
    group: root
    mode: "0644"
    directory_mode: "0755"

- name: Deploy Pi-hole
  ansible.builtin.include_tasks: deploy_stack.yml
  vars:
    service_name: pi-hole
    service_secrets: true
    env_template: pihole.env.j2
