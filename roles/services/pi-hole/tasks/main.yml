- name: Ensure pi-hole directory exists
  ansible.builtin.file:
    path: /opt/stacks/pi-hole
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Decrypt secrets for pi-hole
  ansible.builtin.command:
    cmd: sops decrypt {{ role_path }}/vars/secrets.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: pihole_secrets_raw

- name: Load secrets for pi-hole
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ pihole_secrets_raw.stdout | from_yaml | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true

- name: Template .env for pi-hole
  ansible.builtin.template:
    src: pihole.env.j2
    dest: /opt/stacks/pi-hole/.env
    owner: root
    group: root
    mode: "0600"

- name: Copy Pi-hole docker-compose file
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/stacks/pi-hole/docker-compose.yml
    owner: root
    group: root
    mode: "0644"

- name: Deploy Pi-hole stack
  community.docker.docker_compose_v2:
    project_src: /opt/stacks/pi-hole
    state: present
    files:
      - docker-compose.yml
    remove_orphans: true
  register: pihole_result

- name: Debug Pi-hole result
  ansible.builtin.debug:
    var: pihole_result
