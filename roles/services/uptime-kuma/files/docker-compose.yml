name: uptime-kuma
services:
  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:2.3.2@sha256:9aeb4e51d038047f414309c77a1af553281ca535723cb88907d907269d0a908e
    restart: unless-stopped
    volumes:
      - ./uptime-kuma-data:/app/data
    expose:
      - "3001"
    networks:
      svr1-network:
        ipv4_address: 172.21.255.248
    dns:
      - 172.21.255.254
    dns_search:
      - "."
    healthcheck:
      disable: false

networks:
  svr1-network:
    external: true
