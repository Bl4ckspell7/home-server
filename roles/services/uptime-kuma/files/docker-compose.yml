name: uptime-kuma
services:
  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:2.3.2
    restart: unless-stopped
    volumes:
      - ./uptime-kuma-data:/app/data
    expose:
      - "3001"
    networks:
      svr1-network:
        ipv4_address: 172.21.255.248
    dns:
      - 172.21.255.254
    dns_search:
      - "."

networks:
  svr1-network:
    external: true
