- name: Ensure Authentik directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/stacks
    - /opt/stacks/authentik

- name: Decrypt secrets for Authentik
  ansible.builtin.command:
    cmd: sops decrypt {{ role_path }}/vars/secrets.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: authentik_secrets_raw

- name: Load secrets for Authentik
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ authentik_secrets_raw.stdout | from_yaml | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true

- name: Template Authentik .env file
  ansible.builtin.template:
    src: authentik.env.j2
    dest: /opt/stacks/authentik/.env
    owner: root
    group: root
    mode: "0600"

- name: Copy Authentik docker-compose file
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/stacks/authentik/docker-compose.yml
    owner: root
    group: root
    mode: "0644"

- name: Start Authentik
  community.docker.docker_compose_v2:
    project_src: /opt/stacks/authentik
    state: present
    files:
      - docker-compose.yml
    remove_orphans: true
  register: authentik_result

- name: Debug Docker Compose result
  ansible.builtin.debug:
    var: authentik_result
