---
- name: Deploy Immich stack
  block:
    - name: Ensure Immich stack directory exists
      ansible.builtin.file:
        path: /opt/stacks/immich
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Decrypt secrets for Immich
      ansible.builtin.command:
        cmd: sops decrypt {{ role_path }}/vars/secrets.yml
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      register: immich_secrets_raw

    - name: Load secrets for Immich
      ansible.builtin.set_fact:
        "{{ item.key }}": "{{ item.value }}"
      loop: "{{ immich_secrets_raw.stdout | from_yaml | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true

    - name: Template Immich .env
      ansible.builtin.template:
        src: immich.env.j2
        dest: /opt/stacks/immich/.env
        owner: root
        group: root
        mode: "0600"

    - name: Install Immich docker-compose file
      ansible.builtin.copy:
        src: docker-compose.yml
        dest: /opt/stacks/immich/docker-compose.yml
        owner: root
        group: root
        mode: "0644"

    - name: Deploy Immich stack
      community.docker.docker_compose_v2:
        project_src: /opt/stacks/immich
        state: present
        files:
          - docker-compose.yml
        remove_orphans: true
      register: immich_result

    - name: Debug Immich deploy result
      ansible.builtin.debug:
        var: immich_result
