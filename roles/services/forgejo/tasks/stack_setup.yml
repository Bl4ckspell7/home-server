---
- name: Deploy Forgejo stack
  block:
    - name: Ensure Forgejo stack directory exists
      ansible.builtin.file:
        path: /opt/stacks/forgejo
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Decrypt secrets for forgejo
      ansible.builtin.command:
        cmd: sops decrypt {{ role_path }}/vars/secrets.yml
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      register: forgejo_secrets_raw

    - name: Load secrets for forgejo
      ansible.builtin.set_fact:
        "{{ item.key }}": "{{ item.value }}"
      loop: "{{ forgejo_secrets_raw.stdout | from_yaml | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true

    - name: Template .env for forgejo
      ansible.builtin.template:
        src: forgejo.env.j2
        dest: /opt/stacks/forgejo/.env
        owner: root
        group: root
        mode: "0600"

    - name: Copy Forgejo docker-compose file
      ansible.builtin.copy:
        src: docker-compose.yml
        dest: /opt/stacks/forgejo/docker-compose.yml
        owner: root
        group: root
        mode: "0644"

    - name: Copy Forgejo backup script
      ansible.builtin.copy:
        src: backup.sh
        dest: /opt/stacks/forgejo/backup.sh
        owner: root
        group: root
        mode: "0755"

    - name: Deploy Forgejo stack
      community.docker.docker_compose_v2:
        project_src: /opt/stacks/forgejo
        state: present
        files:
          - docker-compose.yml
        remove_orphans: true
      register: forgejo_result

    - name: Debug Forgejo deploy result
      ansible.builtin.debug:
        var: forgejo_result
