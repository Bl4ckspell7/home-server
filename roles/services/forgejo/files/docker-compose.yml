name: forgejo
services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:15.0.4-rootless@sha256:aea6847e7e18130f173616a92433e47e00813bbe7b42e3732cbbb5f237164096
    container_name: forgejo
    user: 902:902
    env_file: .env
    environment:
      USER_UID: 902
      USER_GID: 902
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo-postgres:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD}
    restart: unless-stopped
    networks:
      forgejo:
      svr1-network:
        ipv4_address: 172.21.255.235
    dns:
      - 172.21.255.254
    dns_search:
      - "."
    volumes:
      - ./forgejo:/var/lib/gitea
      - ./conf:/etc/gitea
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "3000"
      - "2222"
    depends_on:
      - forgejo-postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  forgejo-postgres:
    image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    container_name: forgejo-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: forgejo
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD}
      POSTGRES_DB: forgejo
    networks:
      - forgejo
    volumes:
      - forgejo_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  forgejo_pgdata:
    name: forgejo_pgdata

networks:
  forgejo:
    external: false
  svr1-network:
    external: true
