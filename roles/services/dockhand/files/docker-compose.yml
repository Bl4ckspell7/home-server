name: dockhand
services:
  dockhand:
    container_name: dockhand
    image: fnsys/dockhand:v1.0.31@sha256:cda754fc7ccb4acd0ecc37cc37b9cf0d2b933bf19de89d47957b26ecf109a543
    restart: unless-stopped
    user: "1000:1000"
    group_add:
      - "990" # Docker group GID for socket access
    expose:
      - "3000"
    networks:
      svr1-network:
        ipv4_address: 172.21.255.237
    environment:
      DISABLE_LOCAL_LOGIN: false
    dns:
      - 172.21.255.254
    dns_search: # don't append any search domain
      - "."
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data # Must use bind mount, not named volume
      - /opt/stacks:/opt/stacks
    healthcheck:
      disable: false

networks:
  svr1-network:
    external: true
