name: dockhand
services:
  dockhand:
    container_name: dockhand
    image: docker.io/fnsys/dockhand:v1.0.37@sha256:1927b2b33966a83964a876d010818157b84af05fc3736f1c0c600d7291f2c2b1
    restart: unless-stopped
    user: "1000:1000"
    group_add:
      - "990" # Docker group GID for socket access
    expose:
      - "3000"
    networks:
      svr1-network:
        ipv4_address: 172.21.255.237
    environment:
      DISABLE_LOCAL_LOGIN: false
    dns:
      - 172.21.255.254
    dns_search: # don't append any search domain
      - "."
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data # Must use bind mount, not named volume
      - /opt/stacks:/opt/stacks
    healthcheck:
      disable: false

networks:
  svr1-network:
    external: true
