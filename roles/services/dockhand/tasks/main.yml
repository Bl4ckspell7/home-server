---
- name: Ensure Dockhand data directory exists
  ansible.builtin.file:
    path: /opt/stacks/dockhand/data
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Deploy Dockhand
  ansible.builtin.include_tasks: ../../../../tasks/deploy_stack.yml
  vars:
    service_name: dockhand
