services:
  caddy:
    container_name: caddy
    image: caddy:2.11.3@sha256:ec18ee54aab3315c22e25f3b2babda73ff8007d39b13b3bd1bfffa2f0444c7d9
    restart: always
    ports:
      # - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    expose:
      - "8080"
    networks:
      svr1-network:
        ipv4_address: 172.21.255.238
    dns:
      - 172.21.255.254
    dns_search: # don't append any search domain
      - "."
    volumes:
      - ./conf:/etc/caddy
      # - ./site:/srv
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

networks:
  svr1-network:
    external: true
